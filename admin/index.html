<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OfiHome Admin — Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <div class="logo-box" style="width:36px;height:36px;border:2px solid #fff;border-radius:8px;overflow:hidden;">
        <img src="../imagen/logo OfiHome.png" alt="Logo">
      </div>
      <span>OfiHome Admin</span>
    </div>
    <nav class="admin-nav">
      <a href="./index.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="./products.html"><i class="bi bi-box-seam"></i> Productos</a>
      <a href="./orders.html"><i class="bi bi-bag-check"></i> Pedidos</a>
      <a href="./clients.html"><i class="bi bi-people"></i> Clientes</a>
      <a href="./categories.html"><i class="bi bi-tags"></i> Categorías</a>
      <a href="../index.html" style="margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:16px;">
        <i class="bi bi-arrow-left"></i> Ver tienda
      </a>
      <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <h1>Dashboard</h1>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-card-icon blue"><i class="bi bi-box-seam"></i></div><div class="stat-label">Productos</div><div class="stat-value" id="statProducts">—</div></div>
      <div class="stat-card"><div class="stat-card-icon green"><i class="bi bi-bag-check"></i></div><div class="stat-label">Pedidos</div><div class="stat-value" id="statOrders">—</div></div>
      <div class="stat-card"><div class="stat-card-icon orange"><i class="bi bi-people"></i></div><div class="stat-label">Clientes</div><div class="stat-value" id="statClients">—</div></div>
      <div class="stat-card"><div class="stat-card-icon purple"><i class="bi bi-currency-dollar"></i></div><div class="stat-label">Ingresos totales</div><div class="stat-value" id="statRevenue">—</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <!-- Pedidos recientes -->
      <div class="admin-table-container">
        <div class="admin-table-header">
          <h3>Pedidos recientes</h3>
          <a href="./orders.html" style="font-size:13px;color:#666;">Ver todos →</a>
        </div>
        <table>
          <thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead>
          <tbody id="recentOrders"><tr><td colspan="4" style="text-align:center;padding:20px;color:#999;">Cargando...</td></tr></tbody>
        </table>
      </div>

      <!-- Stock bajo -->
      <div class="admin-table-container">
        <div class="admin-table-header">
          <h3>Stock bajo</h3>
          <a href="./products.html" style="font-size:13px;color:#666;">Gestionar →</a>
        </div>
        <table>
          <thead><tr><th>Producto</th><th>Stock</th><th>Precio</th></tr></thead>
          <tbody id="lowStock"><tr><td colspan="3" style="text-align:center;padding:20px;color:#999;">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Distribución por estado -->
    <div class="admin-table-container">
      <div class="admin-table-header"><h3>Estado de pedidos</h3></div>
      <div style="padding:20px;display:flex;gap:16px;flex-wrap:wrap;" id="orderStats"></div>
    </div>
  </main>
</div>

<script type="module">
  import { requireAdmin, clearSession } from "../js/auth.js";
  import { getProducts, getOrders, getClients } from "../js/api.js";
  import { formatPrice, formatDate } from "../js/utils.js";
  import { ORDER_STATUS } from "../js/config.js";

  requireAdmin();

  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault(); clearSession(); window.location.href = "../index.html";
  });

  try {
    const [products, orders, clients] = await Promise.all([
      getProducts({ limit: 1000 }), getOrders({ limit: 1000 }), getClients({ limit: 1000 })
    ]);

    const revenue = orders.reduce((s, o) => s + o.total, 0);
    document.getElementById("statProducts").textContent = products.length;
    document.getElementById("statOrders").textContent = orders.length;
    document.getElementById("statClients").textContent = clients.length;
    document.getElementById("statRevenue").textContent = formatPrice(revenue);

    // Pedidos recientes
    const tbody = document.getElementById("recentOrders");
    const recent = orders.slice(-5).reverse();
    tbody.innerHTML = recent.length ? recent.map(o => {
      const client = clients.find(c => c.id_key === o.client_id);
      return `<tr>
        <td><strong>#${o.id_key}</strong></td>
        <td>${client ? `${client.name} ${client.lastname}` : `Cliente #${o.client_id}`}</td>
        <td>${formatPrice(o.total)}</td>
        <td><span class="order-status-badge status-${o.status}">${ORDER_STATUS[o.status]}</span></td>
      </tr>`;
    }).join("") : `<tr><td colspan="4" style="text-align:center;color:#999;padding:20px;">Sin pedidos</td></tr>`;

    // Stock bajo
    const low = products.filter(p => p.stock <= 5).sort((a,b) => a.stock - b.stock);
    document.getElementById("lowStock").innerHTML = low.length ? low.map(p => `
      <tr>
        <td>${p.name}</td>
        <td><span class="order-status-badge ${p.stock===0?"status-4":"status-1"}">${p.stock}</span></td>
        <td>${formatPrice(p.price)}</td>
      </tr>`).join("") : `<tr><td colspan="3" style="text-align:center;color:#2d7a3a;padding:20px;">✓ Todo bien</td></tr>`;

    // Stats de estado
    const statusCount = {};
    orders.forEach(o => { statusCount[o.status] = (statusCount[o.status] || 0) + 1; });
    const colors = { 1: "#fff8e1", 2: "#e3f2fd", 3: "#e8f5e9", 4: "#fce4ec" };
    const textColors = { 1: "#c57a00", 2: "#1565c0", 3: "#2d7a3a", 4: "#e53e3e" };
    document.getElementById("orderStats").innerHTML = Object.entries(ORDER_STATUS).map(([k,v]) => `
      <div style="background:${colors[k]};border-radius:12px;padding:20px 28px;text-align:center;">
        <div style="font-size:32px;font-weight:800;color:${textColors[k]};">${statusCount[k]||0}</div>
        <div style="font-size:13px;color:${textColors[k]};margin-top:4px;">${v}</div>
      </div>`).join("");
  } catch(e) {
    console.error(e);
  }
</script>
</body>
</html>
