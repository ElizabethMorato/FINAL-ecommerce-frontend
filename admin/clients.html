<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OfiHome Admin — Clientes</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <div class="logo-box" style="width:36px;height:36px;border:2px solid #fff;border-radius:8px;overflow:hidden;"><img src="../imagen/logo OfiHome.png" alt="Logo"></div>
      <span>OfiHome Admin</span>
    </div>
    <nav class="admin-nav">
      <a href="./index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="./products.html"><i class="bi bi-box-seam"></i> Productos</a>
      <a href="./orders.html"><i class="bi bi-bag-check"></i> Pedidos</a>
      <a href="./clients.html" class="active"><i class="bi bi-people"></i> Clientes</a>
      <a href="./categories.html"><i class="bi bi-tags"></i> Categorías</a>
      <a href="../index.html"><i class="bi bi-arrow-left"></i> Ver tienda</a>
      <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </nav>
  </aside>

  <main class="admin-main">
    <h1>Clientes</h1>
    <div class="admin-table-container">
      <div class="admin-table-header">
        <h3 id="clientsCount">Clientes</h3>
        <input type="text" id="searchClient" placeholder="Buscar cliente..." style="padding:8px 12px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;outline:none;width:220px;">
      </div>
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr></thead>
        <tbody id="clientsTable"><tr><td colspan="5" style="text-align:center;padding:24px;color:#999;">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { requireAdmin, clearSession } from "../js/auth.js";
  import { getClients, deleteClient } from "../js/api.js";
  import { toast } from "../js/utils.js";

  requireAdmin();
  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); clearSession(); window.location.href = "../index.html"; });

  let clients = await getClients({ limit: 1000 });
  document.getElementById("clientsCount").textContent = `Clientes (${clients.length})`;

  function renderTable(list) {
    const tbody = document.getElementById("clientsTable");
    if (!list.length) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:#999;">Sin clientes</td></tr>`; return; }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td><strong>#${c.id_key}</strong></td>
        <td>${c.name} ${c.lastname}</td>
        <td>${c.email}</td>
        <td>${c.telephone}</td>
        <td><button class="btn-table-del" data-id="${c.id_key}"><i class="bi bi-trash3"></i> Eliminar</button></td>
      </tr>`).join("");
    tbody.querySelectorAll(".btn-table-del").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("¿Eliminar este cliente?")) return;
        try { await deleteClient(btn.dataset.id); toast("Cliente eliminado","success"); clients = await getClients({limit:1000}); renderTable(clients); }
        catch(e) { toast("Error: "+e.message,"error"); }
      });
    });
  }

  renderTable(clients);
  document.getElementById("searchClient").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    renderTable(clients.filter(c => `${c.name} ${c.lastname} ${c.email}`.toLowerCase().includes(q)));
  });
</script>
</body>
</html>
