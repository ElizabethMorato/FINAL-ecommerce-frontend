<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OfiHome Admin — Productos</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <div class="logo-box" style="width:36px;height:36px;border:2px solid #fff;border-radius:8px;overflow:hidden;"><img src="../imagen/logo OfiHome.png" alt="Logo"></div>
      <span>OfiHome Admin</span>
    </div>
    <nav class="admin-nav">
      <a href="./index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="./products.html" class="active"><i class="bi bi-box-seam"></i> Productos</a>
      <a href="./orders.html"><i class="bi bi-bag-check"></i> Pedidos</a>
      <a href="./clients.html"><i class="bi bi-people"></i> Clientes</a>
      <a href="./categories.html"><i class="bi bi-tags"></i> Categorías</a>
      <a href="../index.html"><i class="bi bi-arrow-left"></i> Ver tienda</a>
      <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </nav>
  </aside>

  <main class="admin-main">
    <h1>Productos</h1>
    <div class="admin-table-container">
      <div class="admin-table-header">
        <h3 id="tableTitle">Todos los productos</h3>
        <button class="btn-admin-add" id="addProductBtn"><i class="bi bi-plus"></i> Nuevo producto</button>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid #e8e8e8;display:flex;gap:12px;align-items:center;">
        <input type="text" id="searchProduct" placeholder="Buscar producto..." style="padding:8px 12px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;outline:none;flex:1;">
        <select id="filterCat" style="padding:8px 12px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;outline:none;">
          <option value="">Todas las categorías</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>ID</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody id="productsTable"><tr><td colspan="6" style="text-align:center;padding:24px;color:#999;">Cargando...</td></tr></tbody>
      </table>
      <div id="adminLoadMoreContainer" style="text-align:center;margin-top:20px;padding-bottom:16px;"></div>
    </div>
  </main>
</div>

<!-- MODAL PRODUCTO -->
<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Nuevo producto</div>
    <div class="auth-form" style="display:flex;flex-direction:column;gap:14px;">
      <input type="hidden" id="modalProductId">
      <div class="form-group"><label style="font-size:13px;font-weight:600;color:#6b6b6b;">Nombre</label><input type="text" id="modalName" required></div>
      <div class="form-grid" style="gap:14px;">
        <div class="form-group"><label style="font-size:13px;font-weight:600;color:#6b6b6b;">Precio</label><input type="number" id="modalPrice" min="0.01" step="0.01" required></div>
        <div class="form-group"><label style="font-size:13px;font-weight:600;color:#6b6b6b;">Stock</label><input type="number" id="modalStock" min="0" value="0" required></div>
      </div>
      <div class="form-group"><label style="font-size:13px;font-weight:600;color:#6b6b6b;">Categoría</label>
        <select id="modalCat" style="padding:12px 14px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:15px;outline:none;font-family:inherit;"></select>
      </div>
      <div class="form-group">
        <label style="font-size:13px;font-weight:600;color:#6b6b6b;">Descripción</label>
        <textarea id="modalDescription" rows="3" placeholder="Descripción del producto..."
          style="padding:12px 14px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:14px;outline:none;font-family:inherit;resize:vertical;width:100%;box-sizing:border-box;"></textarea>
      </div>
      <div class="form-group">
        <label style="font-size:13px;font-weight:600;color:#6b6b6b;">Color</label>
        <input type="text" id="modalColor" placeholder="Ej: Negro, Blanco, Gris...">
      </div>
      <div class="form-group">
        <label style="font-size:13px;font-weight:600;color:#6b6b6b;">Imágenes del producto</label>
        <div id="imgUrlList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;"></div>
        <button type="button" id="addImgUrlBtn" style="padding:8px 14px;border:1.5px dashed #ccc;border-radius:8px;background:none;font-size:13px;cursor:pointer;color:#666;width:100%;">
          <i class="bi bi-plus"></i> Agregar URL de imagen
        </button>
        <div id="imgGalleryPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;"></div>
        <p style="font-size:11px;color:#999;margin-top:6px;">Clic derecho sobre la imagen → "Abrir imagen en nueva pestaña" → copiá esa URL.</p>
      </div>
      <div id="modalError" class="auth-error"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modalCancel">Cancelar</button>
      <button class="btn-modal-confirm" id="modalConfirm">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAdmin, clearSession } from "../js/auth.js";
  import { getProducts, getCategories, createProduct, updateProduct, deleteProduct } from "../js/api.js";
  import { formatPrice, toast } from "../js/utils.js";

  requireAdmin();
  document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault(); clearSession(); window.location.href = "../index.html";
  });

  let products = [], categories = [];
  const PAGE_SIZE_ADMIN = 10;
  let adminVisibleCount = PAGE_SIZE_ADMIN;
  let lastFilteredList = [];

  async function loadAll() {
    [products, categories] = await Promise.all([getProducts({ limit: 10000 }), getCategories()]);
    const filterCat = document.getElementById("filterCat");
    filterCat.innerHTML = `<option value="">Todas las categorías</option>` +
      categories.map(c => `<option value="${c.id_key}">${c.name}</option>`).join("");
    document.getElementById("modalCat").innerHTML =
      categories.map(c => `<option value="${c.id_key}">${c.name}</option>`).join("");
    lastFilteredList = products;
    adminVisibleCount = PAGE_SIZE_ADMIN;
    renderTable(products);
  }

  function renderTable(list) {
    const tbody = document.getElementById("productsTable");
    const catMap = Object.fromEntries(categories.map(c => [c.id_key, c.name]));

    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:#999;">Sin productos</td></tr>`;
      updateLoadMoreAdmin(list);
      return;
    }

    const toShow = list.slice(0, adminVisibleCount);
    tbody.innerHTML = toShow.map(p => {
      const img = p.image_url ? p.image_url.split(",")[0].trim() : "";
      const stockColor = p.stock === 0 ? "#e53e3e" : p.stock < 5 ? "#d97706" : "#2d7a3a";
      return `<tr>
        <td style="padding:12px 16px;font-weight:600;">#${p.id_key}</td>
        <td style="padding:12px 16px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <img src="${img}" alt="${p.name}" onerror="this.style.visibility='hidden'"
              style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #e8e8e8;flex-shrink:0;background:#f5f5f5;">
            <span>${p.name}</span>
          </div>
        </td>
        <td style="padding:12px 16px;">${catMap[p.category_id] || "—"}</td>
        <td style="padding:12px 16px;">${formatPrice(p.price)}</td>
        <td style="padding:12px 16px;font-weight:700;color:${stockColor};">${p.stock}</td>
        <td style="padding:12px 16px;">
          <button class="btn-table-edit" data-id="${p.id_key}"><i class="bi bi-pencil"></i> Editar</button>
          <button class="btn-table-del" data-id="${p.id_key}"><i class="bi bi-trash3"></i> Eliminar</button>
        </td>
      </tr>`;
    }).join("");

    tbody.querySelectorAll(".btn-table-edit").forEach(btn => {
      btn.addEventListener("click", () => openEdit(parseInt(btn.dataset.id)));
    });
    tbody.querySelectorAll(".btn-table-del").forEach(btn => {
      btn.addEventListener("click", () => confirmDelete(parseInt(btn.dataset.id)));
    });

    updateLoadMoreAdmin(list);
  }

  function updateLoadMoreAdmin(list) {
    const container = document.getElementById("adminLoadMoreContainer");
    if (list.length > adminVisibleCount) {
      const remaining = list.length - adminVisibleCount;
      container.innerHTML = `<button id="adminLoadMoreBtn"
        style="padding:12px 32px;border:2px solid #000;border-radius:10px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;">
        Ver más productos (${remaining} restantes)
      </button>`;
      document.getElementById("adminLoadMoreBtn").addEventListener("click", () => {
        adminVisibleCount += PAGE_SIZE_ADMIN;
        renderTable(lastFilteredList);
      });
    } else {
      container.innerHTML = "";
    }
  }

  // Filtros
  function getFiltered() {
    const q = document.getElementById("searchProduct").value.toLowerCase();
    const cat = document.getElementById("filterCat").value;
    return products.filter(p =>
      (!q || p.name.toLowerCase().includes(q)) &&
      (!cat || p.category_id == cat)
    );
  }
  document.getElementById("searchProduct").addEventListener("input", () => {
    lastFilteredList = getFiltered();
    adminVisibleCount = PAGE_SIZE_ADMIN;
    renderTable(lastFilteredList);
  });
  document.getElementById("filterCat").addEventListener("change", () => {
    lastFilteredList = getFiltered();
    adminVisibleCount = PAGE_SIZE_ADMIN;
    renderTable(lastFilteredList);
  });

  // Galería de imágenes
  let imgUrls = [];

  function renderImgList() {
    const list = document.getElementById("imgUrlList");
    list.innerHTML = imgUrls.map((url, i) => `
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="url" value="${url}" placeholder="https://ejemplo.com/imagen.jpg"
          data-idx="${i}" style="flex:1;padding:9px 12px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:13px;outline:none;">
        <button type="button" data-remove="${i}"
          style="padding:6px 10px;border:1.5px solid #fecaca;border-radius:8px;background:#fff5f5;color:#e53e3e;cursor:pointer;">
          <i class="bi bi-trash3"></i>
        </button>
      </div>`).join("");
    list.querySelectorAll("input[data-idx]").forEach(inp => {
      inp.addEventListener("input", () => { imgUrls[parseInt(inp.dataset.idx)] = inp.value.trim(); renderGalleryPreview(); });
    });
    list.querySelectorAll("button[data-remove]").forEach(btn => {
      btn.addEventListener("click", () => { imgUrls.splice(parseInt(btn.dataset.remove), 1); renderImgList(); renderGalleryPreview(); });
    });
  }

  function renderGalleryPreview() {
    const box = document.getElementById("imgGalleryPreview");
    const valid = imgUrls.filter(u => u);
    box.innerHTML = valid.map(url => `
      <img src="${url}" alt="preview" onerror="this.style.display='none'"
        style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid #e8e8e8;">`).join("");
  }

  document.getElementById("addImgUrlBtn").addEventListener("click", () => { imgUrls.push(""); renderImgList(); });

  function resetImgState(existingImageUrl = "") {
    imgUrls = existingImageUrl ? existingImageUrl.split(",").map(u => u.trim()).filter(Boolean) : [];
    renderImgList();
    renderGalleryPreview();
  }

  // Modal
  const modal = document.getElementById("productModal");
  const openModal = () => modal.classList.add("open");
  const closeModal = () => { modal.classList.remove("open"); document.getElementById("modalError").classList.remove("show"); resetImgState(); };

  document.getElementById("addProductBtn").addEventListener("click", () => {
    document.getElementById("modalTitle").textContent = "Nuevo producto";
    document.getElementById("modalProductId").value = "";
    document.getElementById("modalName").value = "";
    document.getElementById("modalPrice").value = "";
    document.getElementById("modalStock").value = "0";
    document.getElementById("modalDescription").value = "";
    document.getElementById("modalColor").value = "";
    resetImgState();
    openModal();
  });

  function openEdit(id) {
    const p = products.find(x => x.id_key === id);
    if (!p) return;
    document.getElementById("modalTitle").textContent = "Editar producto";
    document.getElementById("modalProductId").value = p.id_key;
    document.getElementById("modalName").value = p.name;
    document.getElementById("modalPrice").value = p.price;
    document.getElementById("modalStock").value = p.stock;
    document.getElementById("modalCat").value = p.category_id;
    document.getElementById("modalDescription").value = p.description || "";
    document.getElementById("modalColor").value = p.color || "";
    resetImgState(p.image_url || "");
    openModal();
  }

  document.getElementById("modalCancel").addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

  document.getElementById("modalConfirm").addEventListener("click", async () => {
    const id = document.getElementById("modalProductId").value;
    const validUrls = imgUrls.filter(u => u.trim());
    const data = {
      name: document.getElementById("modalName").value.trim(),
      price: parseFloat(document.getElementById("modalPrice").value),
      stock: parseInt(document.getElementById("modalStock").value),
      category_id: parseInt(document.getElementById("modalCat").value),
      image_url: validUrls.length ? validUrls.join(",") : null,
      description: document.getElementById("modalDescription").value.trim() || null,
      color: document.getElementById("modalColor").value.trim() || null,
    };
    const errEl = document.getElementById("modalError");
    if (!data.name || isNaN(data.price) || data.price <= 0) {
      errEl.textContent = "Completá todos los campos correctamente."; errEl.classList.add("show"); return;
    }
    try {
      if (id) { await updateProduct(id, data); toast("Producto actualizado", "success"); }
      else { await createProduct(data); toast("Producto creado — ¡ya aparece en la tienda!", "success"); }
      closeModal();
      await loadAll();
    } catch(e) { errEl.textContent = e.message; errEl.classList.add("show"); }
  });

  async function confirmDelete(id) {
    if (!confirm("¿Eliminar este producto? Esta acción no se puede deshacer.")) return;
    try {
      await deleteProduct(id);
      toast("Producto eliminado", "success");
      await loadAll();
    } catch(e) { toast("No se puede eliminar: " + e.message, "error"); }
  }

  await loadAll();
</script>
</body>
</html>
