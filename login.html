<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OfiHome — Ingresar</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="logo-box" style="width:40px;height:40px;border:2px solid #fff;border-radius:10px;overflow:hidden;">
          <img src="./imagen/logo OfiHome.png" alt="Logo">
        </div>
        <span>OfiHome</span>
      </div>
      <p>Tu espacio de trabajo ideal</p>
    </div>

    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Ingresar</button>
        <button class="auth-tab" id="tabRegister">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form" id="formLogin">
        <div class="auth-error" id="loginError"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-submit">Ingresar</button>
        <p style="font-size:12px;color:#999;text-align:center;margin-top:8px;">
          Admin: admin@ofihome.com / admin123
        </p>
      </form>

      <!-- REGISTRO -->
      <form class="auth-form" id="formRegister" style="display:none;">
        <div class="auth-error" id="registerError"></div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="regName" placeholder="Juan" required minlength="1" maxlength="100">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" id="regLastname" placeholder="Pérez" required minlength="1" maxlength="100">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="juan@email.com" required>
        </div>
        <div class="form-group">
          <label>Teléfono (formato internacional)</label>
          <input type="tel" id="regTel" placeholder="+5492614123456" required pattern="^\+?[1-9]\d{6,19}$">
          <small style="color:#999;font-size:11px;">Ej: +5492614123456</small>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="regPassword2" placeholder="Repetí tu contraseña" required>
        </div>
        <button type="submit" class="auth-submit">Crear cuenta</button>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import { login, register, isLoggedIn } from "./js/auth.js";

  // Si ya está logueado, redirigir
  if (isLoggedIn()) window.location.href = "./index.html";

  // Tabs
  const tabLogin = document.getElementById("tabLogin");
  const tabRegister = document.getElementById("tabRegister");
  const formLogin = document.getElementById("formLogin");
  const formRegister = document.getElementById("formRegister");

  tabLogin.addEventListener("click", () => {
    tabLogin.classList.add("active"); tabRegister.classList.remove("active");
    formLogin.style.display = "flex"; formRegister.style.display = "none";
  });
  tabRegister.addEventListener("click", () => {
    tabRegister.classList.add("active"); tabLogin.classList.remove("active");
    formRegister.style.display = "flex"; formLogin.style.display = "none";
  });

  // LOGIN
  formLogin.addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("loginError");
    errEl.classList.remove("show");
    const btn = formLogin.querySelector("button[type=submit]");
    btn.textContent = "Ingresando..."; btn.disabled = true;
    try {
      const user = await login(
        document.getElementById("loginEmail").value.trim(),
        document.getElementById("loginPassword").value
      );
      window.location.href = user.role === "admin" ? "./admin/index.html" : "./index.html";
    } catch(err) {
      errEl.textContent = err.message; errEl.classList.add("show");
      btn.textContent = "Ingresar"; btn.disabled = false;
    }
  });

  // REGISTRO
  formRegister.addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("registerError");
    errEl.classList.remove("show");

    const pass1 = document.getElementById("regPassword").value;
    const pass2 = document.getElementById("regPassword2").value;
    if (pass1 !== pass2) {
      errEl.textContent = "Las contraseñas no coinciden."; errEl.classList.add("show"); return;
    }

    const btn = formRegister.querySelector("button[type=submit]");
    btn.textContent = "Creando cuenta..."; btn.disabled = true;
    try {
      await register({
        name: document.getElementById("regName").value.trim(),
        lastname: document.getElementById("regLastname").value.trim(),
        email: document.getElementById("regEmail").value.trim(),
        telephone: document.getElementById("regTel").value.trim(),
        password: pass1,
      });
      window.location.href = "./index.html";
    } catch(err) {
      errEl.textContent = err.message; errEl.classList.add("show");
      btn.textContent = "Crear cuenta"; btn.disabled = false;
    }
  });
</script>
</body>
</html>
